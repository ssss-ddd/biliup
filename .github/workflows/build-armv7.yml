name: Build biliup for armv7 (32-bit Android)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Build frontend
        run: |
          npm ci
          npm run build
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi
      
      - name: Install cross
        run: cargo install cross
      
      - name: Build biliup-cli for armv7
        run: cross build --release --target armv7-linux-androideabi
        env:
          PYO3_NO_PYTHON: 1
      
      - name: Find and list all binaries
        run: |
          echo "=== 完整的编译输出和文件结构 ==="
          echo "当前目录: $(pwd)"
          echo ""
          echo "=== 寻找所有可执行文件 ==="
          find . -type f \( -name "biliup*" -o -executable \) 2>/dev/null | grep -E "(target|release|bin)" | head -30
          echo ""
          echo "=== target 目录大小 ==="
          du -sh target/ 2>/dev/null || echo "target 目录不存在"
          echo ""
          echo "=== crates/biliup-cli/target 目录 ==="
          du -sh crates/biliup-cli/target/ 2>/dev/null || echo "crates/biliup-cli/target 目录不存在"
          echo ""
          echo "=== 直接列出 release 目录内容 ==="
          ls -lh crates/biliup-cli/target/armv7-linux-androideabi/release/ 2>/dev/null || ls -lh target/armv7-linux-androideabi/release/ 2>/dev/null || echo "未找到 release 目录"
      
      - name: Copy binary - Method 1 (从 crates 目录)
        continue-on-error: true
        run: |
          mkdir -p dist
          cp crates/biliup-cli/target/armv7-linux-androideabi/release/biliup dist/ 2>/dev/null || true
          cp crates/biliup-cli/target/armv7-linux-androideabi/release/biliup-cli dist/ 2>/dev/null || true
          ls -lh dist/
      
      - name: Copy binary - Method 2 (从 root target 目录)
        continue-on-error: true
        run: |
          cp target/armv7-linux-androideabi/release/biliup dist/ 2>/dev/null || true
          cp target/armv7-linux-androideabi/release/biliup-cli dist/ 2>/dev/null || true
          ls -lh dist/
      
      - name: Copy binary - Method 3 (使用 find 搜索)
        run: |
          find . -maxdepth 3 -path "*/armv7-linux-androideabi/release/*" -type f \( -name "biliup" -o -name "biliup-cli" \) -exec cp {} dist/ \;
          echo "=== 最终 dist 目录内容 ==="
          ls -lh dist/
          file dist/* 2>/dev/null || echo "dist 目录为空"
      
      - name: Upload artifacts - 方法A (dist 目录)
        uses: actions/upload-artifact@v4
        with:
          name: biliup-armv7-binary
          path: dist/
          retention-days: 7
      
      - name: Upload artifacts - 方法B (整个 target 目录备份)
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: biliup-armv7-full-target
          path: crates/biliup-cli/target/armv7-linux-androideabi/release/
          retention-days: 7
      
      - name: Print download instructions
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 编译完成！下载可执行文件的方法："
          echo "=========================================="
          echo ""
          echo "方法 1: 在 GitHub Actions 页面"
          echo "  1. 点击本次运行 (Run #...)"
          echo "  2. 滚动到下方找 'Artifacts' 部分"
          echo "  3. 下载 'biliup-armv7-binary'"
          echo ""
          echo "方法 2: 使用 GitHub CLI"
          echo "  gh run download $(echo $GITHUB_RUN_ID) -n biliup-armv7-binary"
          echo ""
          echo "方法 3: 直接下载链接"
          echo "  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "=========================================="
          ls -lh dist/ 2>/dev/null | tail -n +2 || echo "未找到二进制文件"
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
