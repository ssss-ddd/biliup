name: Build biliup for armv7 (32-bit Android)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi
      
      - name: Install cross
        run: cargo install cross
      
      - name: Build biliup-cli for armv7
        run: |
          cd crates/biliup-cli
          cross build --release --target armv7-linux-androideabi
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: biliup-armv7
          path: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
