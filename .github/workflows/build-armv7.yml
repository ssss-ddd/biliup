name: Build biliup for armv7 (32-bit Android)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          npm install
          npm run build
      
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x
      
      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
      
      - name: Install dependencies and Android target
        run: |
          pip install maturin
          rustup target add armv7-linux-androideabi
      
      - name: Set up CPython interpreter for cross-compilation
        run: |
          BASE_URL="https://packages.termux.dev/apt/termux-main/pool/main/p/python"
          FNAME=$(curl -s "$BASE_URL/" | grep -oP '(?<=href=")python_[^"]+_arm\.deb' | head -n 1)
          wget -nv "$BASE_URL/$FNAME"
          mkdir python
          dpkg-deb -x $FNAME python
          cp -a python/data/data/com.termux/files/usr/lib/libpython* $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/arm-linux-androideabi/21
          sed -i 's/"abi3-py38",\? *//g' crates/stream-gears/Cargo.toml
          sed -i '/dependencies = \[/a\    "quickjs >= 1.19.4",' pyproject.toml
          sed -i 's/aiohttp\[speedups\] >= 3\.9\.5/aiohttp[speedups] <= 3.9.5/' pyproject.toml
      
      - name: Build wheel for armv7 (Termux 32-bit)
        run: |
          export NDK_BIN=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin
          export CC_armv7_linux_androideabi=$NDK_BIN/armv7a-linux-androideabi21-clang
          export AR_armv7_linux_androideabi=$NDK_BIN/llvm-ar
          export CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$NDK_BIN/armv7a-linux-androideabi21-clang
          export PYO3_CROSS_LIB_DIR=python/data/data/com.termux/files/usr/lib/
          export ANDROID_API_LEVEL=21
          maturin build \
            --release \
            --strip \
            --manylinux off \
            --target armv7-linux-androideabi \
            --out dist
      
      - name: List build artifacts
        run: |
          echo "=== dist 目录内容 ==="
          ls -lh dist/
          echo ""
          echo "=== 查找所有可执行文件 ==="
          find . -type f -executable -name "*biliup*" 2>/dev/null | head -20
      
      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: biliup-armv7-whl
          path: dist/
          retention-days: 30
      
      - name: Print download instructions
        run: |
          echo ""
          echo "=========================================="
          echo "✅ 编译完成！"
          echo "=========================================="
          echo ""
          echo "Artifacts location:"
          echo "  https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "下载 biliup-armv7-whl 文件即可"
          echo "=========================================="
          ls -lh dist/
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
