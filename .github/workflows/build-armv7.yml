name: Build biliup for armv7 (32-bit Android)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Build frontend
        run: |
          npm ci
          npm run build
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi
      
      - name: Install cross
        run: cargo install cross
      
      - name: Build biliup-cli for armv7
        run: |
          cd crates/biliup-cli
          cross build --release --target armv7-linux-androideabi 2>&1
      
      - name: List all files in target directory
        run: |
          echo "=== Full target directory structure ==="
          find crates/biliup-cli/target -type f 2>/dev/null | head -50
          echo ""
          echo "=== Looking for binary files ==="
          find crates/biliup-cli/target -executable -type f 2>/dev/null | head -20
      
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: biliup-armv7-build
          path: crates/biliup-cli/target/
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
