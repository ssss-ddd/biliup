name: Build biliup for armv7 (32-bit Android)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi
      
      - name: Install Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "NDK_HOME=$(pwd)/android-ndk-r25c" >> $GITHUB_ENV
      
      - name: Set up linker
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml << 'EOF'
          [target.armv7-linux-androideabi]
          linker = "${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang"
          ar = "${{ env.NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/arm-linux-androideabi-ar"
          EOF
      
      - name: Build biliup-cli for armv7
        run: |
          cd crates/biliup-cli
          cargo build --release --target armv7-linux-androideabi
      
      - name: Upload binary
        uses: actions/upload-artifact@v3
        with:
          name: biliup-armv7
          path: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
          retention-days: 30
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: crates/biliup-cli/target/armv7-linux-androideabi/release/biliup
